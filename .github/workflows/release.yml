# Release automation — NODE-ENVIRONMENT build. Trigger: push a version tag.
#
#   npm version patch      # bumps package.json + makes the commit
#   git push && git push --tags   # pushing the v* tag runs this workflow
#
# One artifact, three channels. npm publish IS the build; brew + curl install that same package:
#   1) npm publish @cryptocadet/cli            (prepare -> build; prepublishOnly -> typecheck+test)
#   2) create the GitHub Release (notes only)
#   3) (optional) update the tap formula's url version + sha256 (of the npm tarball)
#
# Secrets (Settings → Secrets and variables → Actions):
#   NPM_TOKEN         — npm automation token with publish rights to @cryptocadet  (required for step 1)
#   TAP_GITHUB_TOKEN  — PAT with contents:write on thetechjd/homebrew-cryptocadet-cli (optional; step 3)
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node:sqlite unflagged on 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # `npm publish` runs prepare (build) + prepublishOnly (typecheck + tests). The published
      # tarball ships prebuilt dist/, so brew/curl/npm installs never build on the user's machine.
      - name: Publish @cryptocadet/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (publish by hand this release)."
            exit 0
          fi
          npm publish

  github-release:
    needs: npm-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release (notes only — no binaries in the node-env model)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  update-tap:
    needs: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Guard on tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "TAP_GITHUB_TOKEN not set — skipping tap update (do it by hand this release)."
          fi
      - name: Checkout tap repo
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: thetechjd/homebrew-cryptocadet-cli
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap
      - name: Rewrite formula url version + sha256 (of the npm tarball)
        if: steps.guard.outputs.enabled == 'true'
        env:
          VERSION: ${{ needs.npm-publish.outputs.version }}
        run: |
          set -eu
          tarball="https://registry.npmjs.org/@cryptocadet/cli/-/cli-${VERSION}.tgz"
          # small retry — the tarball may take a moment to propagate after publish
          for i in 1 2 3 4 5; do curl -fsSL "$tarball" -o pkg.tgz && break || sleep 10; done
          sha=$(sha256sum pkg.tgz | awk '{print $1}')
          F=tap/Formula/cryptocadet.rb
          sed -i -E "s#/@cryptocadet/cli/-/cli-[0-9.]+\.tgz#/@cryptocadet/cli/-/cli-${VERSION}.tgz#" "$F"
          sed -i -E "s/^  version \"[^\"]+\"/  version \"${VERSION}\"/" "$F"
          sed -i -E "s/^  sha256 \"[^\"]+\"/  sha256 \"${sha}\"/" "$F"
      - name: Commit + push tap
        if: steps.guard.outputs.enabled == 'true'
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cryptocadet.rb
          git commit -m "cryptocadet ${{ needs.npm-publish.outputs.version }}"
          git push
